<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tour de la Sucursal — Verificación de Inscripción</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #D4A017;
      --gold-light: #F5C842;
      --gold-dark: #8B6800;
      --black: #0A0A0A;
      --dark: #141414;
      --dark2: #1E1E1E;
      --dark3: #2A2A2A;
      --gray: #666;
      --light: #F5F5F0;
      --white: #FFFFFF;
      --green: #1DB954;
      --red: #E53935;
    }

    html, body {
      min-height: 100vh;
      background-color: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
    }

    /* FONDO con patrón diagonal sutil */
    body {
      background-image: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 40px,
        rgba(212,160,23,0.03) 40px,
        rgba(212,160,23,0.03) 41px
      );
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 4rem;
      overflow: hidden;
    }

    /* círculo decorativo de fondo */
    .hero::before {
      content: '';
      position: absolute;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,160,23,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .badge {
      display: inline-block;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(212,160,23,0.4);
      padding: 6px 18px;
      border-radius: 100px;
      margin-bottom: 2rem;
    }

    .event-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 10vw, 100px);
      line-height: 0.9;
      text-align: center;
      letter-spacing: 2px;
      color: var(--white);
      margin-bottom: 0.3rem;
    }

    .event-title span {
      color: var(--gold);
    }

    .event-sub {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(18px, 3.5vw, 32px);
      letter-spacing: 6px;
      color: var(--gray);
      text-align: center;
      margin-bottom: 3rem;
    }

    /* ── CARD ── */
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--dark2);
      border: 1px solid rgba(212,160,23,0.2);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border-radius: 20px 20px 0 0;
    }

    .card-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 0.5rem;
    }

    .card-title {
      font-size: 20px;
      font-weight: 500;
      color: var(--white);
      margin-bottom: 2rem;
    }

    .input-group {
      position: relative;
      margin-bottom: 1.25rem;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      opacity: 0.4;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      background: var(--dark3);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 300;
      padding: 14px 16px 14px 46px;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input:focus {
      border-color: var(--gold);
    }

    input::placeholder {
      color: rgba(255,255,255,0.2);
    }

    .btn {
      width: 100%;
      background: var(--gold);
      color: var(--black);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 1px;
      padding: 15px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover { background: var(--gold-light); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── SPINNER ── */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: var(--black);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESULTADO ── */
    .result {
      margin-top: 1.5rem;
      border-radius: 14px;
      overflow: hidden;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-found {
      background: rgba(29,185,84,0.08);
      border: 1px solid rgba(29,185,84,0.3);
      padding: 1.5rem;
    }

    .result-not-found {
      background: rgba(229,57,53,0.08);
      border: 1px solid rgba(229,57,53,0.25);
      padding: 1.5rem;
    }

    .result-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .result-icon.green { background: rgba(29,185,84,0.15); }
    .result-icon.red   { background: rgba(229,57,53,0.15); }

    .result-status {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .result-status.green { color: var(--green); }
    .result-status.red   { color: var(--red); }

    .result-name {
      font-size: 20px;
      font-weight: 500;
      color: var(--white);
      margin-bottom: 1rem;
    }

    .result-pill {
      display: inline-block;
      background: rgba(212,160,23,0.12);
      border: 1px solid rgba(212,160,23,0.35);
      color: var(--gold-light);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      padding: 6px 16px;
      border-radius: 100px;
    }

    .result-msg {
      font-size: 14px;
      font-weight: 300;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
    }

    .result-msg a {
      color: var(--gold);
      text-decoration: none;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 2rem 1rem 3rem;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 1px;
    }

    footer span { color: var(--gold); opacity: 0.6; }

    /* ── BIKE DECO ── */
    .deco-line {
      width: 60px;
      height: 1px;
      background: var(--gold);
      opacity: 0.3;
      margin: 0 auto 2rem;
    }
  </style>
</head>
<body>

<section class="hero">
  <div class="badge">Evento de Ciclismo · 2026</div>

  <img
    src="TDLS_LOGOTIPO_BLANCO.png"
    alt="El Tour de la Sucursal"
    style="width: 100%; max-width: 380px; margin-bottom: 2rem; filter: drop-shadow(0 0 30px rgba(212,160,23,0.3));"
  />

  <div class="deco-line"></div>

  <div class="card">
    <p class="card-label">Consulta tu inscripción</p>
    <p class="card-title">Ingresa tu número de cédula para verificar si estás registrado en el evento.</p>

    <div class="input-group">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="16" rx="2"/>
        <circle cx="9" cy="10" r="2"/>
        <path d="M5 20v-1a4 4 0 0 1 8 0v1"/>
        <line x1="15" y1="9" x2="19" y2="9"/>
        <line x1="15" y1="13" x2="19" y2="13"/>
      </svg>
      <input
        type="number"
        id="cedula-input"
        placeholder="Ej: 1234567890"
        autocomplete="off"
        inputmode="numeric"
      />
    </div>

    <button class="btn" id="btn-verificar" onclick="verificar()">
      <span id="btn-text">Verificar inscripción</span>
    </button>

    <div id="resultado"></div>
  </div>
</section>

<footer>
  <p>Tour de la Sucursal &nbsp;·&nbsp; <span>515TEAM</span> &nbsp;·&nbsp; Todos los derechos reservados</p>
</footer>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbyaJm1jkte31XG65jtTQttUYjwVWqS1yU0yJwazx6hYCUzq5wnvYqEUKhhqTEM49QXOgg/exec';

  const input   = document.getElementById('cedula-input');
  const btn     = document.getElementById('btn-verificar');
  const btnText = document.getElementById('btn-text');
  const result  = document.getElementById('resultado');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') verificar(); });

  function setLoading(on) {
    btn.disabled = on;
    btnText.innerHTML = on
      ? '<div class="spinner"></div>'
      : 'Verificar inscripción';
  }

  function verificar() {
    const cedula = input.value.trim();
    if (!cedula) {
      shake(input);
      return;
    }

    setLoading(true);
    result.innerHTML = '';

    // Limpiar script JSONP anterior
    const old = document.getElementById('jsonp-script');
    if (old) old.remove();

    // Timeout por si el script no responde
    const timeout = setTimeout(() => {
      setLoading(false);
      result.innerHTML = `
        <div class="result result-not-found">
          <p class="result-status red">Error de conexión</p>
          <p class="result-msg">No pudimos conectar con el servidor. Intenta de nuevo en unos segundos.</p>
        </div>`;
      delete window.__jsonpCallback;
    }, 8000);

    window.__jsonpCallback = function(data) {
      clearTimeout(timeout);
      setLoading(false);

      if (data.found) {
        result.innerHTML = `
          <div class="result result-found">
            <div class="result-icon green">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1DB954" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </div>
            <p class="result-status green">¡Inscripción confirmada!</p>
            <p class="result-name">${esc(data.nombre)}</p>
            <p style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase;">Categoría</p>
            <span class="result-pill">${esc(data.categoria)}</span>
          </div>`;
      } else {
        result.innerHTML = `
          <div class="result result-not-found">
            <div class="result-icon red">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#E53935" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
            </div>
            <p class="result-status red">No encontrado</p>
            <p class="result-name" style="font-size:16px;">Cédula no registrada</p>
            <p class="result-msg">No encontramos tu número de identificación en la lista de inscritos.<br/>¿Tienes dudas? Escríbenos al <a href="https://wa.me/573146001785" target="_blank">WhatsApp 301 2648660</a>.</p>
          </div>`;
      }

      delete window.__jsonpCallback;
    };

    const script = document.createElement('script');
    script.id = 'jsonp-script';
    script.src = `${API_URL}?cedula=${encodeURIComponent(cedula)}&callback=__jsonpCallback`;
    script.onerror = () => {
      clearTimeout(timeout);
      setLoading(false);
      result.innerHTML = `
        <div class="result result-not-found">
          <p class="result-status red">Error de conexión</p>
          <p class="result-msg">No pudimos conectar con el servidor. Intenta de nuevo en unos segundos.</p>
        </div>`;
      delete window.__jsonpCallback;
    };
    document.body.appendChild(script);
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str ?? '';
    return d.innerHTML;
  }

  function shake(el) {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'shake 0.35s ease';
    el.addEventListener('animationend', () => el.style.animation = '', { once: true });
  }
</script>

<style>
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-5px); }
    80%      { transform: translateX(5px); }
  }
</style>

</body>
</html>
